<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kamoliddin | Backend Developer</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f8f9fa;
                --text-primary: #1a1a1a;
                --text-secondary: #666666;
                --border-color: #e5e7eb;
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg-primary: #0f172a;
                    --bg-secondary: #1e293b;
                    --text-primary: #f1f5f9;
                    --text-secondary: #cbd5e1;
                    --border-color: #334155;
                    --accent: #3b82f6;
                    --accent-hover: #2563eb;
                    --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                    --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4);
                }
            }

            html {
                background-color: var(--bg-primary);
                color: var(--text-primary);
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
                    "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
                    "Helvetica Neue", sans-serif;
                background-color: var(--bg-primary);
                color: var(--text-primary);
                line-height: 1.6;
                transition:
                    background-color 0.3s ease,
                    color 0.3s ease;
            }

            .container {
                max-width: 600px;
                margin: 0 auto;
                padding: 40px 24px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .header {
                text-align: center;
                margin-bottom: 48px;
            }

            .name {
                font-size: 44px;
                font-weight: 700;
                letter-spacing: -0.5px;
                margin-bottom: 8px;
                color: var(--text-primary);
            }

            .subtitle {
                font-size: 18px;
                font-weight: 600;
                color: var(--accent);
                margin-bottom: 16px;
                letter-spacing: 0.3px;
            }

            .intro {
                font-size: 16px;
                color: var(--text-secondary);
                line-height: 1.8;
                margin-bottom: 32px;
                max-width: 500px;
            }

            .button-group {
                display: flex;
                justify-content: center;
                margin-bottom: 48px;
            }

            .download-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 14px 32px;
                background-color: var(--accent);
                color: white;
                text-decoration: none;
                border-radius: 8px;
                font-weight: 600;
                font-size: 16px;
                transition: all 0.3s ease;
                box-shadow: var(--shadow);
                border: none;
                cursor: pointer;
            }

            .download-btn:hover {
                background-color: var(--accent-hover);
                box-shadow: var(--shadow-hover);
                transform: translateY(-2px);
            }

            .download-btn:active {
                transform: translateY(0);
            }

            .download-btn,
            .contact-link {
                transition: all 0.2s ease;
            }

            .download-btn:hover,
            .contact-link:hover {
                transition: all 0.2s ease;
            }

            .contacts {
                display: flex;
                gap: 24px;
                justify-content: center;
                align-items: center;
            }

            .contact-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 44px;
                height: 44px;
                border-radius: 10px;
                background-color: var(--bg-secondary);
                color: var(--text-primary);
                text-decoration: none;
                transition: all 0.3s ease;
                border: 1px solid var(--border-color);
            }

            .contact-link:hover {
                background-color: var(--accent);
                color: white;
                border-color: var(--accent);
                box-shadow: var(--shadow-hover);
                transform: translateY(-2px);
            }

            .footer {
                margin-top: 64px;
                text-align: center;
                font-size: 14px;
                color: var(--text-secondary);
            }

            .icon {
                width: 24px;
                height: 24px;
                fill: currentColor;
            }

            @media (max-width: 640px) {
                .container {
                    padding: 32px 20px;
                }

                .name {
                    font-size: 36px;
                }

                .subtitle {
                    font-size: 16px;
                }

                .intro {
                    font-size: 15px;
                }

                .contacts {
                    gap: 16px;
                }
            }
        </style>
    </head>
    <body>

                        <path

            </div>

            <div class="footer">© 2026</div>
        </div>
    </body>
